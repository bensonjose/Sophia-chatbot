<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia - Your AI assistant!</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      New chat
    </button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <div class="model-pill">
        <span class="dot"></span> Llama 3.3 70B · Groq
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="toggleSidebar" title="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="topbar-title">Sophia - AI assistant</span>
    </header>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-glow"></div>
        <h1>What can I help with?</h1>
        <div class="suggestions">
          <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
            <span class="suggestion-title">Explain a concept</span>
            <span class="suggestion-sub">quantum computing, simply</span>
          </button>
          <button class="suggestion-card" data-prompt="Write a Python function to reverse a linked list">
            <span class="suggestion-title">Write code</span>
            <span class="suggestion-sub">reverse a linked list</span>
          </button>
          <button class="suggestion-card" data-prompt="Give me 5 creative names for a coffee shop">
            <span class="suggestion-title">Brainstorm</span>
            <span class="suggestion-sub">coffee shop names</span>
          </button>
          <button class="suggestion-card" data-prompt="Summarize the plot of Hamlet in 3 sentences">
            <span class="suggestion-title">Summarize</span>
            <span class="suggestion-sub">Hamlet, in 3 sentences</span>
          </button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </div>

    <div class="composer-wrap">
      <form class="composer" id="composerForm">
        <textarea id="promptInput" placeholder="Message Sophia..." rows="1"></textarea>
        <button type="submit" id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <div class="disclaimer">Sophia's responses are generated by an AI model via Groq and may be inaccurate.</div>
    </div>
  </main>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
